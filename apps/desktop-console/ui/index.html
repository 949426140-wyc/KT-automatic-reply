<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>酷太服务器控制台</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">KT</div>
          <div>
            <div class="brand-name">酷太控制台</div>
            <div class="brand-sub">自动回复服务</div>
          </div>
        </div>

        <nav class="nav" aria-label="平台控制台">
          <button class="nav-item active">
            <span>钉钉</span>
            <small>已接入</small>
          </button>
          <button class="nav-item">
            <span>企业微信</span>
            <small>待接入</small>
          </button>
          <button class="nav-item">
            <span>飞书</span>
            <small>待接入</small>
          </button>
          <button class="nav-item">
            <span>微信客服</span>
            <small>预留</small>
          </button>
        </nav>

        <div class="guard">
          <span class="dot amber"></span>
          <div>
            <div class="guard-title">待审核模式</div>
            <div class="guard-text" id="pendingMode">读取中</div>
          </div>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h1>钉钉自动回复控制台</h1>
            <p id="timestamp">正在读取本机服务状态</p>
          </div>
          <div class="top-actions">
            <span class="action-notice" id="actionNotice">就绪</span>
            <button class="icon-button" id="refreshButton" title="刷新">刷新</button>
          </div>
        </header>

        <section class="status-grid">
          <article class="status-card" id="wikiCard">
            <div class="card-head">
              <span class="service-name">LLM Wiki 知识库</span>
              <span class="pill" data-status="loading">读取中</span>
            </div>
            <div class="metric small" id="wikiUpdatedAt">--</div>
            <div class="meta" id="wikiMeta">索引最近生效时间</div>
          </article>

          <article class="status-card" id="aiCard">
            <div class="card-head">
              <span class="service-name">DeepSeek 模型</span>
              <span class="pill" data-status="loading">读取中</span>
            </div>
            <div class="metric small" id="aiModel">--</div>
            <div class="meta">仅基于 LLM Wiki 证据组织回复</div>
          </article>

          <article class="status-card" id="botCard">
            <div class="card-head">
              <span class="service-name">钉钉机器人</span>
              <span class="pill" data-status="loading">读取中</span>
            </div>
            <div class="metric" id="botStatus">--</div>
            <div class="meta">当前容器状态</div>
          </article>

          <article class="status-card" id="visionCard">
            <div class="card-head">
              <span class="service-name">视觉识别</span>
              <span class="pill" data-status="loading">读取中</span>
            </div>
            <div class="metric small" id="visionModel">--</div>
            <div class="meta">火山方舟接入点</div>
          </article>
        </section>

        <section class="workspace-grid">
          <section class="panel command-panel">
            <div class="panel-title vertical">
              <h2>服务器控制</h2>
              <span class="panel-note">点击后立即执行</span>
            </div>

            <div class="command-stack">
              <button class="command primary-command" data-action="start-bot" data-default-small="连接钉钉 Stream">
                <span>启动机器人</span>
                <small>连接钉钉 Stream</small>
              </button>
              <button class="command danger-command" data-action="stop-bot" data-default-small="停止机器人容器">
                <span>关闭机器人</span>
                <small>停止机器人容器</small>
              </button>
              <button class="command" data-action="start-all" data-default-small="机器人 + 知识库监听">
                <span>启动服务</span>
                <small>机器人 + 知识库监听</small>
              </button>
              <button class="command" data-action="selftest" data-default-small="模型与队列">
                <span>自测试</span>
                <small>模型与队列</small>
              </button>
            </div>

            <div class="checklist">
              <div class="check-row"><span id="dockerCheck" class="check-dot"></span><span>Docker</span><strong id="dockerText">--</strong></div>
              <div class="check-row"><span id="wikiCheck" class="check-dot"></span><span>LLM Wiki</span><strong id="wikiText">--</strong></div>
              <div class="check-row"><span id="keyCheck" class="check-dot"></span><span>密钥</span><strong id="keyText">--</strong></div>
            </div>
          </section>

          <section class="panel run-panel">
            <div class="panel-title">
              <h2>运行记录</h2>
              <span id="packageInfo">源码仓库：-</span>
            </div>
            <pre id="logBox">等待日志...</pre>
          </section>

          <section class="panel qa-panel">
            <div class="panel-title">
              <h2>实时问答记录</h2>
              <span class="counter" id="qaCount">0</span>
            </div>
            <div class="qa-list" id="qaList"></div>
          </section>
        </section>
      </main>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
